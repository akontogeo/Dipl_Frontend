<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Eye shape -->
  <ellipse cx="50" cy="50" rx="45" ry="30" fill="url(#grad1)"/>
  
  <!-- Iris -->
  <circle cx="50" cy="50" r="18" fill="#ffffff" opacity="0.9"/>
  
  <!-- Pupil -->
  <circle cx="50" cy="50" r="10" fill="#1a1a1a"/>
  
  <!-- Highlight -->
  <circle cx="45" cy="45" r="4" fill="#ffffff" opacity="0.8"/>
  
  <!-- AI circuit lines -->
  <path d="M 10 50 L 20 50" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <path d="M 80 50 L 90 50" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <circle cx="10" cy="50" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="90" cy="50" r="2" fill="#ffffff" opacity="0.5"/>
</svg>
